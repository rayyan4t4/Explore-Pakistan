<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Discover 500+ beautiful, historical and local places of Pakistan on an interactive map.">
  <meta name="theme-color" content="#0d1117">
  <title>Explore Pakistan — Interactive Tourism Map</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header id="main-header">
    <div class="header-left">
      <button id="btn-menu" class="icon-btn mobile-only" aria-label="Open sidebar">☰</button>
      <div class="logo">
        <span class="logo-icon">🇵🇰</span>
        <div class="logo-text">
          <span class="logo-title">Explore Pakistan</span>
          <span class="logo-sub">Tourism Map</span>
        </div>
      </div>
    </div>

    <div class="header-center">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="search" id="search" placeholder="Search places…" autocomplete="off" aria-label="Search places">
        <div id="search-suggestions" class="search-suggestions hidden"></div>
        <button id="clear-search" class="clear-btn hidden" aria-label="Clear">✕</button>
      </div>
    </div>

    <div class="header-right">
      <button id="btn-theme" class="icon-btn" title="Toggle theme" aria-label="Toggle light/dark mode">
        <span id="theme-icon">🌙</span>
        <span class="btn-label" id="theme-label">Dark</span>
      </button>
      <button id="btn-favorites" class="icon-btn" title="Favorites" aria-label="Toggle favorites">
        <span>❤️</span>
        <span class="btn-label">Favorites</span>
      </button>
      <button id="btn-reset" class="icon-btn desktop-only" title="Reset view" aria-label="Reset map">
        <span>🔄</span>
        <span class="btn-label">Reset</span>
      </button>
    </div>
  </header>

  <!-- SIDEBAR OVERLAY (mobile tap-outside-to-close) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- MAIN -->
  <div class="app-container">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Places</span>
        <button id="btn-sidebar-close" class="icon-btn mobile-only" aria-label="Close sidebar">✕</button>
      </div>

      <!-- Category chips -->
      <div class="filter-chips-wrap">
        <div class="filter-chips" id="filter-chips">
          <button class="chip active" data-cat="all">🌍 All</button>
          <button class="chip" data-cat="mountain">🏔️ Mountains</button>
          <button class="chip" data-cat="valley">🌿 Valleys</button>
          <button class="chip" data-cat="historical">🏛️ Historical</button>
          <button class="chip" data-cat="lake">💧 Lakes</button>
          <button class="chip" data-cat="beach">🏖️ Beaches</button>
          <button class="chip" data-cat="religious">🕌 Religious</button>
          <button class="chip" data-cat="city">🏙️ Cities</button>
          <button class="chip" data-cat="wildlife">🦁 Wildlife</button>
          <button class="chip" data-cat="desert">🏜️ Deserts</button>
        </div>
      </div>

      <!-- Province + Sort (inline) -->
      <div class="filter-row">
        <select id="province-select" aria-label="Filter by province">
          <option value="all">All Regions</option>
          <option value="Gilgit-Baltistan">Gilgit-Baltistan</option>
          <option value="KPK">KPK</option>
          <option value="Punjab">Punjab</option>
          <option value="Sindh">Sindh</option>
          <option value="Balochistan">Balochistan</option>
          <option value="AJK">Azad Kashmir</option>
          <option value="Islamabad">Islamabad</option>
        </select>
        <select id="sort-select" aria-label="Sort">
          <option value="name">A–Z</option>
          <option value="rating">Top Rated</option>
          <option value="province">Region</option>
        </select>
      </div>

      <!-- Stats -->
      <div class="stats-bar">
        <span id="places-count">0 places</span>
        <span id="filter-label-text" class="stats-label"></span>
      </div>

      <!-- List -->
      <ul id="places-list" role="list"></ul>
    </aside>

    <!-- MAP -->
    <div id="map-container">
      <div id="map" aria-label="Pakistan interactive map"></div>

      <!-- Layer switcher -->
      <div class="map-controls">
        <button class="layer-btn active" data-layer="standard" title="Standard">🗺️</button>
        <button class="layer-btn" data-layer="satellite" title="Satellite">🛰️</button>
        <button class="layer-btn" data-layer="dark" title="Dark">🌙</button>
      </div>

      <!-- Mobile FAB to open sidebar -->
      <button id="btn-fab" class="fab mobile-only" aria-label="Browse places">☰ Browse</button>
    </div>
  </div>

  <!-- INFO PANEL -->
  <div id="info-panel" class="info-panel" role="dialog" aria-label="Place details" aria-hidden="true">
    <!-- Drag handle (mobile) -->
    <div class="panel-handle"></div>
    <button id="close-panel" class="close-panel-btn" aria-label="Close">✕</button>

    <div class="panel-hero">
      <img id="panel-image" src="" alt="" loading="lazy">
      <div class="panel-hero-overlay">
        <div class="panel-badges">
          <span id="panel-category-badge" class="category-badge"></span>
          <span id="panel-province-badge" class="province-badge"></span>
        </div>
        <h2 id="panel-title"></h2>
        <div id="panel-rating" class="panel-rating"></div>
      </div>
    </div>

    <div class="panel-body">
      <!-- Quick info -->
      <div class="panel-quickinfo">
        <div class="qi-item"><span>📅</span><div><div class="qi-label">Best Time</div><div id="panel-besttime" class="qi-value"></div></div></div>
        <div class="qi-item"><span>📍</span><div><div class="qi-label">Region</div><div id="panel-province" class="qi-value"></div></div></div>
      </div>

      <!-- Description -->
      <div class="panel-section">
        <div class="section-label">About</div>
        <p id="panel-description"></p>
      </div>

      <!-- History -->
      <div class="panel-section">
        <div class="section-label">History</div>
        <p id="panel-history"></p>
      </div>

      <!-- Actions -->
      <div class="panel-actions">
        <button id="btn-favorite-place" class="action-btn fav-btn">
          <span class="fav-icon">🤍</span><span class="fav-label">Save</span>
        </button>
        <button id="btn-directions" class="action-btn dir-btn">
          <span>🧭</span><span>Maps</span>
        </button>
        <button id="btn-share" class="action-btn share-btn">
          <span>🔗</span><span>Share</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="places.js"></script>
  <script src="script.js"></script>
</body>
</html>
